<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Compteur de calories</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <style>
    :root {
      --bg: #000000;
      --panel: #0f0f0f;
      --panel-2: #161616;
      --border: #262626;
      --text: #f5f5f5;
      --muted: #9ca3af;
      --track: #3a3a3a;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      --radius: 24px;
      --picker-height: 285px;
      --row-height: 42px;
      --center-height: 60px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 12px 12px 18px;
    }

    .app {
      width: 100%;
      max-width: 440px;
    }

    .card {
      background: linear-gradient(180deg, var(--panel), #090909);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 12px;
      animation: fadeIn 0.35s ease;
    }

    .hidden {
      display: none !important;
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: -0.3px;
    }

    .sub {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      margin-bottom: 12px;
    }

    .section-title {
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .gauge-wrap {
      position: relative;
      display: flex;
      justify-content: center;
      margin-top: 2px;
      margin-bottom: 6px;
      animation: softRise 0.35s ease;
    }

    svg {
      width: 100%;
      max-width: 320px;
      height: auto;
      display: block;
    }

    .gauge-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .gauge-readout {
      margin-top: 112px;
      text-align: center;
      animation: fadeIn 0.35s ease;
    }

    .current {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 42px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.6px;
    }

    .current-unit {
      margin-top: 4px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.2px;
      color: var(--muted);
    }

    .target {
      margin-top: 8px;
      font-size: 15px;
      color: var(--muted);
      line-height: 1.35;
    }

    .status {
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      margin-top: 8px;
      margin-bottom: 12px;
      min-height: 20px;
      transition: color 0.25s ease, opacity 0.25s ease;
    }

    .status.green {
      color: var(--green);
    }

    .status.red {
      color: var(--red);
    }

    .picker-row {
      display: flex;
      justify-content: center;
      margin-top: 6px;
    }

    .picker-block {
      min-width: 0;
      width: 100%;
      max-width: 260px;
    }

    .add-panel {
      width: 100%;
      max-width: 260px;
      border-radius: 22px;
      background: linear-gradient(180deg, #181818, #111111);
      border: 1px solid #2b2b2b;
      padding: 0 0 12px;
      box-shadow: inset 0 0 24px rgba(255,255,255,0.02);
    }

    .picker {
      width: 100%;
      height: var(--picker-height);
      border-radius: 22px 22px 0 0;
      background: linear-gradient(180deg, #181818, #111111);
      border: 0;
      position: relative;
      overflow: hidden;
      touch-action: none;
      box-shadow: inset 0 0 24px rgba(255,255,255,0.02);
    }

    .picker::before,
    .picker::after {
      content: "";
      position: absolute;
      left: 0;
      width: 100%;
      height: 86px;
      z-index: 5;
      pointer-events: none;
    }

    .picker::before {
      top: 0;
      background: linear-gradient(180deg, rgba(17,17,17,1) 0%, rgba(17,17,17,0.94) 38%, rgba(17,17,17,0) 100%);
    }

    .picker::after {
      bottom: 0;
      background: linear-gradient(0deg, rgba(17,17,17,1) 0%, rgba(17,17,17,0.94) 38%, rgba(17,17,17,0) 100%);
    }

    .picker-center-line {
      position: absolute;
      left: 12px;
      right: 12px;
      top: 50%;
      height: var(--center-height);
      transform: translateY(-50%);
      border-top: 1px solid #3a3a3a;
      border-bottom: 1px solid #3a3a3a;
      border-radius: 14px;
      z-index: 4;
      pointer-events: none;
      background: rgba(255,255,255,0.035);
      box-shadow:
        inset 0 0 20px rgba(255,255,255,0.02),
        0 0 16px rgba(255,255,255,0.02);
    }

    .picker-wheel {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .picker-item {
      position: absolute;
      left: 0;
      width: 100%;
      height: var(--row-height);
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      pointer-events: none;
      will-change: transform, opacity, filter, top;
    }

    .picker-value-text {
      display: inline-block;
      min-width: 84px;
      text-align: center;
      font-weight: 700;
      transform-origin: center center;
      white-space: nowrap;
      transition: color 0.12s ease, transform 0.12s ease, opacity 0.12s ease;
    }

    .picker-label {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
      letter-spacing: 0.2px;
    }

    .side-action {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 10px 12px 0;
    }

    #addCaloriesBtn {
      width: 100%;
      min-height: 52px;
      border-radius: 14px;
      background: linear-gradient(180deg, #34d16f, var(--green));
      color: white;
      box-shadow: 0 8px 20px rgba(34,197,94,0.28);
    }

    #addCaloriesBtn:hover {
      box-shadow: 0 10px 24px rgba(34,197,94,0.36);
    }

    button {
      width: 100%;
      min-height: 56px;
      border: 0;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.2s ease, background 0.25s ease, box-shadow 0.25s ease;
    }

    button:active {
      transform: scale(0.985);
    }

    .primary {
      background: linear-gradient(180deg, #4d8dff, var(--blue));
      color: white;
      box-shadow: 0 8px 20px rgba(59,130,246,0.25);
    }

    .primary:hover {
      box-shadow: 0 10px 24px rgba(59,130,246,0.32);
    }

    .secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid #2b2b2b;
    }

    .danger {
      background: #2a1111;
      color: #ffb4b4;
      border: 1px solid #4a1d1d;
    }

    .actions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .footer-note {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes softRise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 380px) {
      .current {
        font-size: 38px;
      }

      .gauge-readout {
        margin-top: 104px;
      }

      .picker {
        height: 270px;
      }

      .actions-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="setupCard" class="card">
      <h1>Compteur de calories</h1>
      <div class="sub">
        Choisis d’abord ton objectif journalier.
      </div>

      <div class="section-title">Objectif du jour</div>

      <div class="picker-block" style="width:100%; max-width:260px; margin:0 auto 12px;">
        <div class="picker" id="goalPicker" style="border-radius:22px;">
          <div class="picker-center-line"></div>
          <div class="picker-wheel" id="goalWheel"></div>
        </div>
        <div class="picker-label">kcal</div>
      </div>

      <button class="primary" id="validateGoalBtn">Valider l’objectif</button>
    </div>

    <div id="trackerCard" class="card hidden">
      <h1>Compteur de calories</h1>

      <div class="gauge-wrap">
        <svg viewBox="0 0 420 250" aria-label="Jauge de calories">
          <path
            id="trackArc"
            fill="none"
            stroke="#3a3a3a"
            stroke-width="28"
            stroke-linecap="round"
          ></path>

          <path
            id="progressArc"
            fill="none"
            stroke="#22c55e"
            stroke-width="28"
            stroke-linecap="round"
            stroke-dasharray="0 9999"
          ></path>
        </svg>

        <div class="gauge-overlay">
          <div class="gauge-readout">
            <div class="current">
              <span id="consumedValue">0</span>
              <span class="current-unit">kcal</span>
            </div>
            <div class="target">
              Objectif : <span id="targetValue">1700</span> kcal
            </div>
          </div>
        </div>
      </div>

      <div id="statusText" class="status green">Tu es à 0 % de ton objectif.</div>

      <div class="picker-row">
        <div class="add-panel">
          <div class="picker-block" style="max-width:none;">
            <div class="picker" id="addPicker">
              <div class="picker-center-line"></div>
              <div class="picker-wheel" id="addWheel"></div>
            </div>
            <div class="picker-label">kcal à ajouter</div>
          </div>

          <div class="side-action">
            <button id="addCaloriesBtn">Ajouter</button>
          </div>
        </div>
      </div>

      <div class="actions-grid">
        <button class="secondary" id="changeGoalBtn">Modifier l’objectif</button>
        <button class="danger" id="resetDayBtn">Remise à zéro</button>
      </div>

      <div class="footer-note">
        L’objectif et le compteur sont enregistrés automatiquement sur l’appareil.
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "calorie-counter-v7";

    const state = {
      goal: 1700,
      consumed: 0,
      addAmount: 350,
      minValue: 5,
      maxGoal: 5000,
      maxAdd: 5000,
      step: 5
    };

    const els = {
      setupCard: document.getElementById("setupCard"),
      trackerCard: document.getElementById("trackerCard"),

      goalPicker: document.getElementById("goalPicker"),
      goalWheel: document.getElementById("goalWheel"),
      validateGoalBtn: document.getElementById("validateGoalBtn"),

      addPicker: document.getElementById("addPicker"),
      addWheel: document.getElementById("addWheel"),
      addCaloriesBtn: document.getElementById("addCaloriesBtn"),

      consumedValue: document.getElementById("consumedValue"),
      targetValue: document.getElementById("targetValue"),
      statusText: document.getElementById("statusText"),

      changeGoalBtn: document.getElementById("changeGoalBtn"),
      resetDayBtn: document.getElementById("resetDayBtn"),

      trackArc: document.getElementById("trackArc"),
      progressArc: document.getElementById("progressArc")
    };

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function roundToStep(value) {
      return Math.round(value / state.step) * state.step;
    }

    function normalizeValue(value, min, max) {
      return clamp(roundToStep(value), min, max);
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        goal: state.goal,
        consumed: state.consumed,
        addAmount: state.addAmount
      }));
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;

      try {
        const parsed = JSON.parse(raw);

        if (typeof parsed.goal === "number") {
          state.goal = normalizeValue(parsed.goal, state.minValue, state.maxGoal);
        }

        if (typeof parsed.consumed === "number") {
          state.consumed = Math.max(0, roundToStep(parsed.consumed));
        }

        if (typeof parsed.addAmount === "number") {
          state.addAmount = normalizeValue(parsed.addAmount, state.minValue, state.maxAdd);
        }
      } catch (error) {
        console.error("Erreur de lecture localStorage :", error);
      }
    }

    function describeTopArcLeftToRight(cx, cy, r) {
      return `M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}`;
    }

    function updateGauge() {
      const cx = 210;
      const cy = 210;
      const r = 140;

      const path = describeTopArcLeftToRight(cx, cy, r);
      els.trackArc.setAttribute("d", path);
      els.progressArc.setAttribute("d", path);

      const pathLength = els.progressArc.getTotalLength();
      const ratio = state.goal > 0 ? state.consumed / state.goal : 0;
      const visibleRatio = Math.max(0, Math.min(ratio, 1));
      const progressLength = pathLength * visibleRatio;

      els.progressArc.setAttribute("stroke-dasharray", `${progressLength} ${pathLength}`);
      els.progressArc.setAttribute("stroke", ratio > 1 ? "#ef4444" : "#22c55e");
    }

    function updateTexts() {
      const ratio = state.goal > 0 ? state.consumed / state.goal : 0;
      const percent = Math.round(ratio * 100);

      els.consumedValue.textContent = state.consumed;
      els.targetValue.textContent = state.goal;

      els.statusText.classList.remove("green", "red");

      if (ratio <= 1) {
        els.statusText.classList.add("green");
        els.statusText.textContent = `Tu es à ${percent} % de ton objectif.`;
      } else {
        els.statusText.classList.add("red");
        els.statusText.textContent = `Objectif dépassé de ${state.consumed - state.goal} kcal.`;
      }
    }

    function render() {
      updateTexts();
      updateGauge();
      goalPicker.render();
      addPicker.render();
      saveState();
    }

    function showTracker() {
      els.setupCard.classList.add("hidden");
      els.trackerCard.classList.remove("hidden");
    }

    function showSetup() {
      els.setupCard.classList.remove("hidden");
      els.trackerCard.classList.add("hidden");
      render();
    }

    function createCarouselPicker(options) {
      const {
        element,
        wheelElement,
        getValue,
        setValue,
        maxValue
      } = options;

      const rowHeight = 42;
      const centerY = 142;
      const visibleRange = 6;

      let dragY = 0;
      let lastPointerY = 0;
      let lastMoveTime = 0;
      let velocity = 0;
      let dragging = false;
      let raf = null;

      function applyStepsFromDrag() {
        while (dragY >= rowHeight / 2) {
          setValue(clamp(getValue() - state.step, state.minValue, maxValue));
          dragY -= rowHeight;
        }

        while (dragY <= -rowHeight / 2) {
          setValue(clamp(getValue() + state.step, state.minValue, maxValue));
          dragY += rowHeight;
        }
      }

      function renderWheel() {
        wheelElement.innerHTML = "";

        for (let i = -visibleRange; i <= visibleRange; i++) {
          const item = document.createElement("div");
          item.className = "picker-item";

          const y = centerY + (i * rowHeight) + dragY;
          const distancePx = y - centerY;
          const normalized = Math.min(Math.abs(distancePx) / (rowHeight * 3.5), 1);
          const value = clamp(getValue() + i * state.step, state.minValue, maxValue);

          const scale = 1.62 - (normalized * 0.82);
          const opacity = 1 - (normalized * 0.86);
          const blur = normalized * 0.85;
          const fontSize = 15 + (1 - normalized) * 18;
          const fontWeight = normalized < 0.18 ? 800 : 700;

          item.style.top = `${y - rowHeight / 2}px`;
          item.style.opacity = opacity.toFixed(3);
          item.style.filter = `blur(${blur.toFixed(2)}px)`;
          item.style.transition = dragging
            ? "none"
            : "top 0.16s ease, opacity 0.18s ease, filter 0.18s ease";

          const text = document.createElement("div");
          text.className = "picker-value-text";
          text.textContent = value;
          text.style.transform = `scale(${Math.max(scale, 0.7).toFixed(3)})`;
          text.style.fontSize = `${fontSize.toFixed(1)}px`;
          text.style.fontWeight = String(fontWeight);
          text.style.color = normalized < 0.16 ? "#ffffff" : "#9ca3af";
          text.style.opacity = normalized < 0.16 ? "1" : String(Math.max(0.35, 1 - normalized * 0.55));

          item.appendChild(text);
          wheelElement.appendChild(item);
        }
      }

      function animate() {
        if (!dragging) {
          dragY += velocity;
          velocity *= 0.94;

          applyStepsFromDrag();

          if (Math.abs(velocity) < 0.015) {
            velocity = 0;
            dragY *= 0.82;

            if (Math.abs(dragY) < 0.12) {
              dragY = 0;
            }
          }
        }

        renderWheel();

        if (dragging || Math.abs(velocity) > 0.015 || Math.abs(dragY) > 0.12) {
          raf = requestAnimationFrame(animate);
        } else {
          raf = null;
        }
      }

      function ensureAnimation() {
        if (!raf) {
          raf = requestAnimationFrame(animate);
        }
      }

      function startInteraction(clientY) {
        dragging = true;
        lastPointerY = clientY;
        lastMoveTime = performance.now();
        velocity = 0;
        ensureAnimation();
      }

      function moveInteraction(clientY) {
        if (!dragging) return;

        const now = performance.now();
        const dy = clientY - lastPointerY;
        const dt = Math.max(1, now - lastMoveTime);

        lastPointerY = clientY;
        lastMoveTime = now;

        dragY += dy;
        velocity = (dy / dt) * 10.5;

        applyStepsFromDrag();
        renderWheel();
      }

      function endInteraction() {
        if (!dragging) return;
        dragging = false;
        ensureAnimation();
      }

      element.addEventListener("wheel", (event) => {
        event.preventDefault();
        velocity = 0;

        if (event.deltaY > 0) {
          setValue(clamp(getValue() + state.step, state.minValue, maxValue));
        } else {
          setValue(clamp(getValue() - state.step, state.minValue, maxValue));
        }

        dragY = 0;
        renderWheel();
      }, { passive: false });

      element.addEventListener("touchstart", (event) => {
        startInteraction(event.touches[0].clientY);
      }, { passive: true });

      element.addEventListener("touchmove", (event) => {
        moveInteraction(event.touches[0].clientY);
      }, { passive: true });

      element.addEventListener("touchend", endInteraction);
      element.addEventListener("touchcancel", endInteraction);

      element.addEventListener("mousedown", (event) => {
        event.preventDefault();
        startInteraction(event.clientY);
      });

      window.addEventListener("mousemove", (event) => {
        moveInteraction(event.clientY);
      });

      window.addEventListener("mouseup", endInteraction);

      return {
        render: renderWheel
      };
    }

    const goalPicker = createCarouselPicker({
      element: els.goalPicker,
      wheelElement: els.goalWheel,
      getValue: () => state.goal,
      setValue: (value) => { state.goal = value; },
      maxValue: state.maxGoal
    });

    const addPicker = createCarouselPicker({
      element: els.addPicker,
      wheelElement: els.addWheel,
      getValue: () => state.addAmount,
      setValue: (value) => { state.addAmount = value; },
      maxValue: state.maxAdd
    });

    els.validateGoalBtn.addEventListener("click", () => {
      showTracker();
      render();
    });

    els.addCaloriesBtn.addEventListener("click", () => {
      state.consumed = Math.max(0, roundToStep(state.consumed + state.addAmount));
      render();
    });

    els.changeGoalBtn.addEventListener("click", () => {
      showSetup();
    });

    els.resetDayBtn.addEventListener("click", () => {
      const confirmed = confirm("Remettre le compteur du jour à zéro ?");
      if (!confirmed) return;
      state.consumed = 0;
      render();
    });

    loadState();
    showTracker();
    render();
  </script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", async () => {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const reg of regs) {
        await reg.unregister();
      }
    });
  }
</script>
</body>
</html>
